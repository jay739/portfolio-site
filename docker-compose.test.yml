services:
  portfolio-test:
    image: node:20
    container_name: portfolio-test
    working_dir: /app
    command: >
      bash -lc "npm install --legacy-peer-deps &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3333:3000"  # Test on port 3333 instead of 3000
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - HOSTNAME=0.0.0.0
    volumes:
      - ./:/app
      - portfolio_test_node_modules:/app/node_modules
      - ./service-account.json:/app/service-account.json:ro
    networks:
      - test_network

networks:
  test_network:
    driver: bridge

volumes:
  portfolio_test_node_modules:
