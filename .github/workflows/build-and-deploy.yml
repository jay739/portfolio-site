name: Build and Deploy Portfolio

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'content/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'next.config.js'
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear build cache'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🗑️ Clear GitHub Actions cache (if requested)
        if: github.event.inputs.clear_cache == 'true'
        run: |
          echo "Clearing GitHub Actions cache..."
          gh extension install actions/gh-actions-cache || true
          gh actions-cache delete --all || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
          buildkitd-flags: --debug

      - name: 🏷️ Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/portfolio
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event.inputs.clear_cache == 'true' }}
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096
            NEXT_PUBLIC_GA_MEASUREMENT_ID=G-LYDFWSJ06J
          provenance: false
        timeout-minutes: 25

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/portfolio
            docker-compose pull portfolio
            docker-compose up -d portfolio
            docker image prune -f

      - name: ✅ Deployment notification
        run: |
          echo "✅ Portfolio deployed successfully!"
          echo "🔗 URL: https://jay739.dev"
