# PR validation only — lint, test, and a production build to catch breakage
# BEFORE code reaches main. No image is built or pushed here; shipping the
# image is handled by build-and-deploy.yml on push to main.
name: CI (PR validation)

on:
  # No path filter: this is a REQUIRED status check on main, so it must run on
  # every PR. A path-skipped required check stays "Expected" forever and blocks merge.
  pull_request:
    branches:
      - main
      - dev

# Cancel superseded runs on the same PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: ⬢ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: 🔍 Lint
        run: npm run lint

      - name: 🧪 Test
        run: npm test --if-present

      - name: 🏗️ Production build
        env:
          # NEXT_PUBLIC_* is embedded in the client bundle, so it is not secret.
          # Pull from repo Variables if set; build still succeeds if empty.
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build
